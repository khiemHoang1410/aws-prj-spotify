AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'spotify-clone-backend

  '
Resources:
  SpotifyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ..\..\swagger.yaml
  GetSongsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetSongsFunction
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      Environment:
        Variables:
          SONGS_TABLE:
            Ref: SongsTable
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: SongsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId:
              Ref: SpotifyApi
            Path: /songs
            Method: get
    Metadata:
      SamResourceId: GetSongsFunction
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
  SongsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Songs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: songId
        AttributeType: S
      KeySchema:
      - AttributeName: songId
        KeyType: HASH
  PlaylistsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Playlists
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: playlistId
        AttributeType: S
      - AttributeName: songId
        AttributeType: S
      KeySchema:
      - AttributeName: playlistId
        KeyType: HASH
      - AttributeName: songId
        KeyType: RANGE
  UserInteractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_UserInteractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: interactionId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: interactionId
        KeyType: RANGE
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: conversationId
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: S
      KeySchema:
      - AttributeName: conversationId
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${SpotifyApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
