service: spotify-aws-workshop
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 15
  # Biến môi trường hệ thống
  environment:
    TABLE_NAME: ${self:custom.tableName}
    BUCKET_NAME: ${self:custom.bucketName}
    REGION: ${self:provider.region}
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
          Resource: !GetAtt SpotifyTable.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: !Join ['', [!GetAtt SpotifyMediaBucket.Arn, '/*']]

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  tableName: ${self:service}-${self:provider.stage}-table
  bucketName: ${self:service}-${self:provider.stage}-media
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    exclude: ['@aws-sdk/*']

functions:
  healthCheck:
    handler: src/handlers/health.handler
    events:
      - http:
          path: health
          method: get
          cors: true

resources:
  Resources:
    SpotifyTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: Hash
          - AttributeName: sk
            KeyType: Range
        BillingMode: PAY_PER_REQUEST

    SpotifyMediaBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}