AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  spotify-clone-backend

Resources:
  # 1. Khởi tạo API Gateway đọc từ file swagger
  SpotifyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      DefinitionBody:
        'Fn::Transform':
          Name: 'AWS::Include'
          Parameters:
            Location: swagger.yaml

  # 2. Khởi tạo Lambda function
  GetSongsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get-songs/
      Handler: app.handler # Trỏ tới file app.js và hàm handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref SpotifyApi
            Path: /songs
            Method: get
  # --- THÊM VÀO TỪ ĐOẠN NÀY DƯỚI RESOURCES ---

  # 1. Bảng Users
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # 2. Bảng Songs
  SongsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Songs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: songId
          AttributeType: S
      KeySchema:
        - AttributeName: songId
          KeyType: HASH

  # 3. Bảng Playlists
  PlaylistsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Playlists
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: playlistId
          AttributeType: S
        - AttributeName: songId
          AttributeType: S
      KeySchema:
        - AttributeName: playlistId
          KeyType: HASH
        - AttributeName: songId
          KeyType: RANGE

  # 4. Bảng User Interactions (Likes, History, etc.)
  UserInteractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_UserInteractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: interactionId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: interactionId
          KeyType: RANGE

  # 5. Bảng Messages (Cho tính năng chat tương lai)
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Spotify_Messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${SpotifyApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"